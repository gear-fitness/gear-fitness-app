spring.application.name=Gear Fitness API

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/seed
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# Google OAuth2
google.client-id=${GOOGLE_CLIENT_ID}

# Gemini API Key
gemini.api.key=${GEMINI_API_KEY}

# Perplexity Sonar (AI natural-language food logging, PLUS tier and above)
# Empty default so an unset key does not kill startup; the AI endpoint degrades
# gracefully (503 AI_UNAVAILABLE) instead. See PerplexityClient / AiNutritionService.
perplexity.api.key=${PERPLEXITY_API_KEY:}
perplexity.model=sonar
# Max paid Sonar calls (cache misses) per calendar month before the API returns 503.
ai.nutrition.monthly-sonar-cap=500
# Max paid Sonar calls (cache misses) per user per calendar day before the API returns 503.
perplexity.user.daily.cap=20

# S3 Configuration
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.posts-bucket-name=${AWS_S3_POSTS_BUCKET_NAME}
aws.s3.region=${AWS_REGION}
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}

# Image Moderation (AWS Rekognition). The Rekognition client reuses
# aws.s3.region (same-region requirement). min-confidence is the label
# confidence (0-100) at/above which a post is auto-hidden for review.
aws.moderation.min-confidence=${MODERATION_MIN_CONFIDENCE:80}
# Top-level Rekognition v7 categories that cause a post to be hidden
# (comma-separated, must be exact v7 L1 names). Gym app: only genuinely harmful
# content is flagged; shirtless/swimwear/underwear/legs are normal and pass.
aws.moderation.flagged-categories=${MODERATION_FLAGGED_CATEGORIES:Explicit,Visually Disturbing,Violence,Hate Symbols}
# Empty default so the app still boots when unset; an unset/blank secret leaves
# the review endpoints locked (403) rather than open. Set it to enable reviews.
moderation.review-secret=${MODERATION_REVIEW_SECRET:}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# app specific properties
apple.bundle-id=com.gearfitness.dev.build

# RevenueCat webhook authorization header (must match the value configured on
# the RevenueCat dashboard webhook). Verified per-request in the webhook controller.
revenuecat.webhook.secret=${REVENUECAT_WEBHOOK_SECRET}
