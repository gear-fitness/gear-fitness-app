name: Format Check

on:
  pull_request:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check formatting
        id: prettier
        run: npx prettier --check "**/*.java" "**/*.ts" "**/*.tsx"

      - name: Formatting failed
        if: failure() && steps.prettier.conclusion == 'failure'
        run: |
          echo "::error::Formatting check failed. Run 'npm run format' in the project root to fix, then commit the changes."
          exit 1
